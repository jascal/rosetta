# examples/riscv — the RISC-V ISA expert (MODEL-FREE: retrieval/lookup + gated n-grams). See ../../EXPERTS.md.
#
# MEASURED decision (not a default): we distilled riscv with llama-3.2-1b and the scorecard said the cover's smart tier
# is empty — idiom_learn found 0 causal gate/compose idioms (only rules.txt formatting). A frozen spec is a *lookup*
# domain for a small model: riscv-distilled ≈ retrieval + memorized n-grams, no reasoning gain. So riscv is model-free:
# retrieval over the spec (cited) + gated corpus n-grams + abstain. (Contrast: examples/logic is model-distilled —
# logic is a reasoning domain where the cover carries real idioms.)
#
# Build:  .venv/bin/python -m pack.build examples/riscv/expert.toml      (no model, no fieldrun)

[corpus]                                        # CORPUS DESIGN
text       = "examples/riscv/rules.txt"         # 3258 normative rules as citable passages (grounding/citation)
text_plain = "examples/riscv/rules_plain.txt"   # the same text without [norm:…] markup — the gated-n-gram corpus
# TODO (the "more content" lever, now the PRIMARY answer source): add the manual PROSE (definitions/explanations) from
# riscv-isa-manual (CC BY 4.0) — the norm-rules are statements, the prose is what makes "what is machine mode?" answerable.
citation   = "RISC-V ISA Manual (CC BY 4.0)"

# no [model] — model-free (the measured call above)

[experiment]                                    # EXPERIMENTAL DESIGN
off_domain = "examples/probes/negatives.txt"    # no holdout: no cover/curated to hold out; retrieval/n-grams over the spec

[gate]                                          # HARD-FAIL thresholds
max_leak = 0.05                                 # verbatim retrieval → gate on off-domain leak (precision is retrieval-bound)
